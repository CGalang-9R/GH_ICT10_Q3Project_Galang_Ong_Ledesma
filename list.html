<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">

    <!-- PyScript -->
    <link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css">
    <script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>

    <!-- CSS -->
    <link rel="stylesheet" type="text/css" href="style.css">

    <title>Player List - Team Checker</title>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-sm mb-5">
        <div class="container-fluid">
            <a class="navbar-brand d-none d-md-flex">
                <img src="ob.png" alt="Logo" style="width:200px;">
            </a>
            <div class="container-fluid">
                <ul class="nav nav-tabs">
               
                    <li><a class="nav-link text-info" href="players.html" target="_blank">Players</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Page content -->
    <div class="containerM">
        <h1>Player List</h1>
        <p>Click the button below to display the list of registered players:</p>
        <input type="button" py-click="show_players" class="btn btn-primary mb-3" value="Show Players">

        <!-- Container where Python will generate the list -->
        <div id="player-output" class="mt-3"></div>
    </div>

    <div class="footer mt-5">
        <h4>Charlize Galang, Aisha Ledesma, Raiden Ong | 10-Ruby</h4>
    </div>

    <!-- External PyScript file -->
    <py-script src="main.py"></py-script>

</body>
</html>
