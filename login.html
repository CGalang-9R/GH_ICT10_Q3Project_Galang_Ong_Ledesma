<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css">
    <script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>
    <title>Project Q3: Intramurals</title>
</head>
<body>
    <form>
        <div id='1st'>
        <h1>LOG-IN</h1>
        <h3>to your student account</h3>
        <label for="username">Username:</label>
            <br><input type="text" id="username" name="username" placeholder="Full name">
        <br><label for="email">Email:</label>
            <br><input type="email" id="email" name="email" placeholder="School email" required>
        <br><label for="password">Password:</label>
            <br><input type="password" id="password" name="password" placeholder="Password" required>

        <br><input type="button" py-click="signup_complete" value="Login">
        <br><p>Accounts are not premade. Sign up with the credentials provided to you by your teacher.</p>

        <div id="output-login"></div>
        </div> <!-- LOGIN PAGE -->
    </form>

    <py-script src="main.py"></py-script>
</body>
</html>
